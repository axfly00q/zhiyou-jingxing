server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;
  location / { try_files $uri $uri/ /index.html; }
  location /api/ {
    proxy_pass http://orchestrator:8000;
    proxy_set_header Host $host;
    client_max_body_size 60m;
    proxy_request_buffering off;
  }
  location /static/ {
    proxy_pass http://orchestrator:8000;
    proxy_set_header Host $host;
    client_max_body_size 60m;
  }
}
