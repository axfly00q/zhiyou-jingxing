version: "3.9"

# 一键拉起底层基础设施 + 自研 orchestrator + 三个前端。
# Dify / LiveTalking / FunASR / CosyVoice2 这类重型组件以"外部服务"形式接入：
# - 演示机上推荐独立 docker compose 单独启动（见 docs/部署手册.md）
# - 此处只把 URL 通过环境变量注入 orchestrator
#
# 为了让本仓库 `docker compose up -d` 在普通机器上也能跑起业务壳，
# 默认只起：postgres / redis / neo4j / orchestrator / 三个前端 / nginx。

name: zhiyou-jingxing

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  orchestrator:
    build:
      context: ../orchestrator
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
      - neo4j
    ports:
      - "8000:8000"
    volumes:
      - ../orchestrator/data:/app/data

  frontend-tourist:
    build:
      context: ../frontend-tourist
    restart: unless-stopped
    ports:
      - "5173:80"

  frontend-admin:
    build:
      context: ../frontend-admin
    restart: unless-stopped
    ports:
      - "5174:80"

  frontend-dashboard:
    build:
      context: ../frontend-dashboard
    restart: unless-stopped
    ports:
      - "5175:80"

volumes:
  pg_data:
  neo4j_data:
